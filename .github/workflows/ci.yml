##############################################################################
# CI Workflow — migrated from Jenkinsfile
#
# Original: Jenkinsfile (declarative pipeline, docker agent node:18-alpine)
# Shared libs expanded inline:
#   - vars/buildDocker.groovy  → "Docker Build & Push" job
#   - vars/notifySlack.groovy  → notify-* jobs
#
# Trigger mapping:
#   Jenkins pollSCM('H/5 * * * *') → on: push / pull_request
#
# Credential / secret mapping:
#   npm-token                  → secrets.NPM_TOKEN
#   docker-registry-creds      → secrets.DOCKER_REGISTRY_USER + DOCKER_REGISTRY_PASS
#   kubeconfig-staging         → secrets.KUBECONFIG_STAGING (file content as secret)
#   SonarQube server token     → secrets.SONAR_TOKEN
#   Slack webhook              → secrets.SLACK_WEBHOOK_URL
##############################################################################

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Replaces Jenkins: options { disableConcurrentBuilds() }
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOCKER_REGISTRY: registry.company.com
  APP_NAME: web-frontend
  SONAR_HOST: https://sonar.company.com

jobs:
  # ---------------------------------------------------------------------------
  # Stage: Install Dependencies
  # ---------------------------------------------------------------------------
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    # Replaces Jenkins: agent { docker { image 'node:18-alpine' } }
    container:
      image: node:18-alpine
    timeout-minutes: 30        # Replaces Jenkins: options { timeout(time: 30, unit: 'MINUTES') }
    steps:
      # Replaces Jenkins: checkout scm
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0     # Full history needed for SonarQube analysis

      - name: Show recent git log
        # Replaces Jenkins: sh 'git log --oneline -5'
        run: git log --oneline -5

      # Replaces Jenkins: sh 'npm ci'
      - name: Install npm dependencies
        run: npm ci
        env:
          # Replaces Jenkins: NPM_TOKEN = credentials('npm-token')
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Cache node_modules as artifact to share between jobs
      # (Replaces stash/unstash pattern)
      # actions/upload-artifact v4.6.2
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: node-modules
          path: node_modules/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Stage: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: node:18-alpine
    timeout-minutes: 30
    needs: install
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/download-artifact v4.2.1
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: node-modules
          path: node_modules/
      # Replaces Jenkins: sh 'npm run lint'
      - name: Run ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Stage: Unit Tests
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: node:18-alpine
    timeout-minutes: 30
    needs: install
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/download-artifact v4.2.1
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: node-modules
          path: node_modules/
      # Replaces Jenkins: sh 'npm test -- --coverage'
      - name: Run unit tests with coverage
        run: npm test -- --coverage

      # Replaces Jenkins: junit 'test-results/**/*.xml'
      # Upload test results as artifact (Jenkins publishHTML → upload-artifact)
      # actions/upload-artifact v4.6.2
      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-coverage
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Stage: SonarQube Analysis + Quality Gate
  # Replaces: withSonarQubeEnv / waitForQualityGate
  # Uses SonarSource/sonarqube-scan-action (self-hosted SonarQube)
  # ---------------------------------------------------------------------------
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, test]
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0       # SonarQube needs full history for blame/SCM data

      # actions/download-artifact v4.2.1
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: test-coverage
          path: coverage/

      # Replaces Jenkins: withSonarQubeEnv('SonarQube') { sh 'npx sonar-scanner' }
      # SonarSource/sonarqube-scan-action v4.2.1
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@bfd4e558cda28cda6b5defafb9232d191be8c203
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST }}

      # Replaces Jenkins: timeout(time: 5) { waitForQualityGate abortPipeline: true }
      # SonarSource/sonarqube-quality-gate-action v1.1.0
      - name: SonarQube Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST }}

  # ---------------------------------------------------------------------------
  # Stage: Build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: node:18-alpine
    timeout-minutes: 30
    needs: [lint, test]
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/download-artifact v4.2.1
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: node-modules
          path: node_modules/
      # Replaces Jenkins: sh 'npm run build'
      - name: Build application
        run: npm run build
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Replaces Jenkins: archiveArtifacts artifacts: 'dist/**/*', fingerprint: true
      # actions/upload-artifact v4.6.2
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Stage: Docker Build & Push
  # Replaces: vars/buildDocker.groovy (expanded inline)
  # Only runs on main branch (Replaces Jenkins: when { branch 'main' })
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, sonar]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/download-artifact v4.2.1
      - uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e
        with:
          name: dist
          path: dist/

      # --- Expanded from vars/buildDocker.groovy ---
      # Replaces:
      #   def fullImage = "${DOCKER_REGISTRY}/${APP_NAME}:${BUILD_NUMBER}"
      #   sh "docker build -t ${fullImage} ."
      #   sh "echo ${DOCKER_PASS} | docker login ... --password-stdin"
      #   sh "docker push ${fullImage}"
      # Replaces Jenkins: withCredentials([usernamePassword(credentialsId: 'docker-registry-creds', ...)])

      # docker/setup-buildx-action v3.10.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      # docker/login-action v3.4.0
      # Replaces:
      #   sh "echo ${DOCKER_PASS} | docker login ${DOCKER_REGISTRY} -u ${DOCKER_USER} --password-stdin"
      - name: Log in to Docker registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASS }}

      # docker/build-push-action v6.15.0
      # Replaces:
      #   sh "docker build -t ${imageTag} ."
      #   sh "docker push ${imageTag}"
      # Expands buildDocker.groovy: also tags :latest (as the shared lib does)
      - name: Build and push Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:${{ github.run_number }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:latest
          # Replaces buildDocker.groovy: buildArgs: ['NODE_ENV=production']
          build-args: |
            NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Stage: Deploy to Staging
  # Only runs on main branch (Replaces Jenkins: when { branch 'main' })
  # Replaces: withCredentials([file(credentialsId: 'kubeconfig-staging', ...)])
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: staging
    permissions:
      contents: read
      deployments: write
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # Replaces:
      #   withCredentials([file(credentialsId: 'kubeconfig-staging', variable: 'KUBECONFIG')]) {
      #     sh "kubectl set image ..."
      #     sh "kubectl rollout status ..."
      #   }
      - name: Deploy to staging cluster
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          # Write kubeconfig from secret (replaces Jenkins secret file credential)
          echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml

          kubectl set image deployment/${{ env.APP_NAME }} \
            ${{ env.APP_NAME }}=${{ env.DOCKER_REGISTRY }}/${{ env.APP_NAME }}:${{ github.run_number }} \
            -n staging

          kubectl rollout status deployment/${{ env.APP_NAME }} \
            -n staging --timeout=300s

          # Cleanup
          rm -f /tmp/kubeconfig.yaml

  # ---------------------------------------------------------------------------
  # Notification: Success
  # Replaces: post { success { slackSend(...) } }
  # Expanded inline from vars/notifySlack.groovy
  # ---------------------------------------------------------------------------
  notify-success:
    name: Notify Slack — Success
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: success()
    steps:
      # Replaces notifySlack.groovy: status='SUCCESS', channel='#deployments'
      # slackapi/slack-github-action v2.1.0
      - name: Send Slack success notification
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52
        with:
          payload: |
            {
              "channel": "#deployments",
              "attachments": [
                {
                  "color": "good",
                  "text": ":white_check_mark: *${{ github.workflow }}* #${{ github.run_number }} - *SUCCESS*\nBranch: ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Build>"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ---------------------------------------------------------------------------
  # Notification: Failure
  # Replaces: post { failure { slackSend(...) } }
  # Expanded inline from vars/notifySlack.groovy
  # Runs when ANY required job fails
  # ---------------------------------------------------------------------------
  notify-failure:
    name: Notify Slack — Failure
    runs-on: ubuntu-latest
    needs: [lint, test, sonar, build, docker, deploy-staging]
    if: failure()
    steps:
      # Replaces notifySlack.groovy: status='FAILURE', channel='#deployments'
      # slackapi/slack-github-action v2.1.0
      - name: Send Slack failure notification
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52
        with:
          payload: |
            {
              "channel": "#deployments",
              "attachments": [
                {
                  "color": "danger",
                  "text": ":x: *${{ github.workflow }}* #${{ github.run_number }} - *FAILURE*\nBranch: ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Build>"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
